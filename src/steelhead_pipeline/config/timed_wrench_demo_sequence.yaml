# Demo sequence chaining two TimedWrench maneuvers: drive forward for a fixed
# time, then spin in place (e.g. gate style points). Each entry must be a
# PipelineType constant and have a matching <type>.yaml in this directory.
/steelhead/pipeline_sequence_manager:
  ros__parameters:
    pipeline_sequence:
    - task_forward_drive
    - task_style_spin
