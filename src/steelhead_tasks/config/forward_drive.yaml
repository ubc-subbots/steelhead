# Loaded into the timed_wrench node by the pipeline manager (see
# steelhead_pipeline/config/task_forward_drive.yaml). Drives straight ahead
# for `duration` seconds while hover_at_depth holds depth and heading, e.g. a
# blind forward leg. force_x matches the gate task's forward_drive default.
timed_wrench:
  ros__parameters:
    duration: 5.0
    force_x: 10.0
    success_message: "Forward drive complete"
